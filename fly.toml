# fly.toml app configuration file generated for blackwall-hono on 2026-03-10T21:13:46Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'blackwall-hono'
primary_region = 'fra'

[build]
  dockerfile = "fly/Dockerfile"

[http_service]
internal_port = 8000
force_https = true
processes = ['app']

[[vm]]
memory = '512mb'
cpu_kind = 'shared'
cpus = 1
memory_mb = 512

[mounts]
source = 'blackwall_data'
destination = '/app/blackwall_data'
